<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Tyman's Cube Shop</title>
        <meta charset="utf-8">
        <!-- Link to external CSS file -->
        <link rel="stylesheet" href="CSS/homepage.css">
        <!-- Google Font: Aldrich Link -->
        <link href="https://fonts.googleapis.com/css2?family=Aldrich&display=swap" rel="stylesheet">
    </head>
    <body>
        <!-- Navigation Bar Header Section -->
        <header class="header">
            <div class="top-button"><a href="homepage.html">Home</a></div>
            <div class="title">Tyman's Cube Shop</div>
            <div class="top-button"><a href="product_list.html">Products</a></div>
        </header>
        <!-- Homepage Content -->
        <main>
            <h1 class="body-title">Discover Your Ideal Rubik's Cube</h1>
            <!-- Product Grid One -->
            <p class="subtitle">Explore Square Layered Cubes</p>
            <div class="product-grid-one">
                <!-- 2x2 Rubik's Cube -->
                <div class="product-card">
                    <h2 class="product-title">2x2 Rubik's Cube</h2>
                    <div class="product-image">
                        <img src="Media Assets/2x2 cover.jpg" alt="2x2 Rubik's Cube">
                    </div>
                    <button class="buy-button">Shop Now</button>
                </div>
                <!-- 3x3 Rubik's Cube -->
                <div class="product-card">
                    <h2 class="product-title">3x3 Rubik's Cube</h2>
                    <div class="product-image">
                        <img src="Media Assets/3x3 cover.jpg" alt="3x3 Rubik's Cube">
                    </div>
                    <button class="buy-button" onclick="window.location.href = 'product_page.html';">Shop Now</button>
                </div>
                <!-- 4x4 Rubik's Cube -->
                <div class="product-card">
                    <h2 class="product-title">4x4 Rubik's Cube</h2>
                    <div class="product-image">
                        <img src="Media Assets/4x4 cover.jpg" alt="4x4 Rubik's Cube">
                    </div>
                    <button class="buy-button">Shop Now</button>
                </div>
            </div>
            <!-- Product Grid Two -->
            <p class="subtitle">Special Polygon Cubes</p>
            <div class="product-grid-two">
                <!-- The Pyraminx -->
                <div class="product-card">
                    <h2 class="product-title">The Pyraminx</h2>
                    <div class="product-image">
                        <img src="Media Assets/Pyraminx cover.jpg" alt="Pyraminx Cube">
                    </div>
                    <button class="buy-button">Shop Now</button>
                </div>
                <!-- The Skewb -->
                <div class="product-card">
                    <h2 class="product-title">The Skewb</h2>
                    <div class="product-image">
                        <img src="Media Assets/Skewb cover.jpg" alt="Skewb Cube">
                    </div>
                    <button class="buy-button">Shop Now</button>
                </div>
            </div>
        </main>
        <!-- Footer -->
        <footer class="footer">
            <p>Copyright © 2024 Tyman Huang</p>
        </footer>
    </body>
</html>
